name: Build and Deploy to VPS

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repository
        id: repo
        run: |
          echo "lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.lower }}:${{ github.ref_name }}
            ghcr.io/${{ steps.repo.outputs.lower }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Lowercase repository
        id: repo
        run: |
          echo "lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /opt/crawler

            # 同步部署脚本到当前 tag（防止 VPS 本地仓库落后导致脚本和镜像不匹配）
            git config --global --add safe.directory /opt/crawler/repo || true
            cd /opt/crawler/repo
            if [ -n "$(git status --porcelain)" ]; then
              echo "ERROR: /opt/crawler/repo has local changes, refusing to deploy"
              exit 1
            fi
            git fetch --tags
            git checkout "${{ github.ref_name }}"
            cd /opt/crawler

            # 兜底：如果 symlink 断了，重新指向 deployment/linux/
            for f in deploy.sh update.sh rollback.sh docker-compose.yml .env.example; do
              target="/opt/crawler/repo/deployment/linux/${f}"
              if [ ! -e "$target" ]; then
                echo "ERROR: $target does not exist, refusing to deploy"
                exit 1
              fi
              ln -sfn "$target" "$f"
            done

            sed -i 's|^CRAWLER_IMAGE_BASE=.*|CRAWLER_IMAGE_BASE=ghcr.io/${{ steps.repo.outputs.lower }}|' .env
            grep -q '^CRAWLER_IMAGE_BASE=' .env || echo 'CRAWLER_IMAGE_BASE=ghcr.io/${{ steps.repo.outputs.lower }}' >> .env
            export CRAWLER_IMAGE_BASE=ghcr.io/${{ steps.repo.outputs.lower }}
            bash ./update.sh "${{ github.ref_name }}"
