name: Build and Push Image

# 生产 8 个 crawler 容器是独立 docker run 管理，部署用 VPS 上的滚动更新脚本
# （/tmp/rolling-update.py）。不要在这里加 SSH deploy job：compose 风格的
# 部署脚本会误建一个与 hs-sku-crawler-1 身份重复的容器。

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repository
        id: repo
        run: |
          echo "lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.lower }}:${{ github.ref_name }}
            ghcr.io/${{ steps.repo.outputs.lower }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
