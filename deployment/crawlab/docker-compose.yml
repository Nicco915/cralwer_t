services:
  crawlab:
    image: crawlabteam/crawlab:0.6.3
    container_name: crawlab
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9666:9666"
    environment:
      - CRAWLAB_NODE_MASTER=Y
      - CRAWLAB_MONGO_HOST=mongo
      - CRAWLAB_REDIS_HOST=redis
      - CRAWLAB_LOG_LEVEL=info
      - CRAWLAB_GRPC_SERVER_ADDRESS=0.0.0.0:9666
      - CRAWLAB_SERVER_HOST=0.0.0.0
    volumes:
      - crawlab-data:/data
      - ./logs:/app/logs:ro
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crawler-net

  mongo:
    image: mongo:6.0.15
    container_name: crawlab-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - crawler-net

  redis:
    image: redis:7.2.4-alpine
    container_name: crawlab-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - crawler-net

  crawler-1:
    image: ${CRAWLER_IMAGE:?未设置 CRAWLER_IMAGE 环境变量}
    container_name: hs-sku-crawler-1
    restart: unless-stopped
    user: "1000:1000"
    env_file: .env
    environment:
      - CRAWLER_MODE=service
      - CRAWLER_NODE_CODE=crawler-01
      - CRAWLER_HEALTH_PORT=3001
      - CRAWLER_CLIPROXY_SESSION_PREFIX=crawler-01
      - CRAWLER_HEADED_FALLBACK=false
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ./logs:/app/logs
      - ./output/crawler-01:/app/output
      - ./images/crawler-01:/app/images
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 800M
        reservations:
          cpus: '0.2'
          memory: 400M
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - crawler-net

