version: "3.8"

services:
  crawler:
    image: ${CRAWLER_IMAGE:?未设置 CRAWLER_IMAGE 环境变量}
    container_name: hs-sku-crawler
    restart: unless-stopped
    env_file: .env
    environment:
      - CRAWLER_MODE=service
      - CRAWLER_NODE_CODE=${CRAWLER_NODE_CODE:-crawler-eu-01}
    volumes:
      - ./logs:/app/logs
      - ./output:/app/output
      - ./images:/app/images
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
