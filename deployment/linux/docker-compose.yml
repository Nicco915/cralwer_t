services:
  crawler:
    image: ${CRAWLER_IMAGE:?未设置 CRAWLER_IMAGE 环境变量}
    container_name: hs-sku-crawler
    restart: unless-stopped
    env_file: .env
    environment:
      - CRAWLER_MODE=service
      - CRAWLER_NODE_CODE=${CRAWLER_NODE_CODE:-crawler-01}
      - CRAWLER_HEADED_FALLBACK=false
      - CRAWLER_IDLE_RECLAIM_MS=${CRAWLER_IDLE_RECLAIM_MS:-300000}
      - CRAWLER_IDLE_REAP_INTERVAL_MS=${CRAWLER_IDLE_REAP_INTERVAL_MS:-30000}
    volumes:
      - ./logs:/app/logs
      - ./output:/app/output
      - ./images:/app/images
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
