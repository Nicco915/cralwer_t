apiVersion: 1
groups:
  - orgId: 1
    name: crawler-heartbeat
    folder: Crawler
    interval: 1m
    rules:
      - uid: crawler-heartbeat-missing
        title: CrawlerNodeHeartbeatMissing
        condition: A
        data:
          - refId: A
            datasourceUid: loki
            relativeTimeRange: { from: 600, to: 0 }
            model:
              expr: 'time() - max by (nodeCode) (timestamp({app="crawler"} | json | component="heartbeat" | nodeCode=~".+"))'
              instant: true
              refId: A
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: "节点 {{ $labels.nodeCode }} 心跳缺失超过 5 分钟"
        labels:
          severity: critical

  - orgId: 1
    name: crawler-failure-rate
    folder: Crawler
    interval: 1m
    rules:
      - uid: crawler-failure-rate-high
        title: CrawlerFailureRateHigh
        condition: B
        data:
          - refId: A
            datasourceUid: loki
            relativeTimeRange: { from: 600, to: 0 }
            model:
              expr: 'sum(rate({app="crawler"} | json | component="task" | status="error" [5m])) / sum(rate({app="crawler"} | json | component="task" | status=~".+" [5m]))'
              instant: true
              refId: A
              instantQuery: true
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: { from: 0, to: 0 }
            model:
              type: threshold
              refId: B
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0.5]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                    params: []
                  type: query
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: "全局任务失败率超过 50%"
        labels:
          severity: warning