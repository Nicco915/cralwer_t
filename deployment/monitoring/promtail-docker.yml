server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576

scrape_configs:
  - job_name: crawler-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project"]
    relabel_configs:
      # 优先使用容器上的 CRAWLER_NODE_CODE label，否则用容器名 hs-sku-crawler-N
      - source_labels: ['__meta_docker_container_label_CRAWLER_NODE_CODE']
        regex: '(.+)'
        target_label: 'nodeCode'
      - source_labels: ['nodeCode', '__meta_docker_container_name']
        regex: '^;?/(hs-sku-crawler-\d+)$'
        target_label: 'nodeCode'
        replacement: '${1}'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      - target_label: 'app'
        replacement: 'crawler'
      - target_label: 'job'
        replacement: 'docker'
    pipeline_stages:
      - json:
          expressions:
            level: s
            component: c
            msg: msg
            ctx: ctx
            id: id
            time: 't["$date"]'
      - labels:
          level:
          component:

  - job_name: crawler-host-logs
    static_configs:
      - targets: ['localhost']
        labels:
          app: crawler
          job: docker
          nodeCode: crawler-host
          __path__: /app/logs/crawler-*.log
    pipeline_stages:
      - json:
          expressions:
            level: s
            component: c
            msg: msg
            ctx: ctx
            id: id
            time: 't["$date"]'
      - labels:
          level:
          component:
