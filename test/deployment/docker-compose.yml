services:
  stub-server:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ../..:/app
    ports:
      - "3456:3456"
    command: node test/fixtures/stub-server.js --port 3456 --host 0.0.0.0 --task-count 30
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3456/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 2s
      timeout: 5s
      retries: 10

  crawler-node-1:
    image: mcr.microsoft.com/playwright:v1.60.0-jammy
    working_dir: /app
    volumes:
      - ../..:/app
    environment:
      - CRAWLER_MODE=service
      - CRAWLER_NODE_CODE=crawler-01
      - CRAWLER_NODE_TOKEN=test-token
      - CRAWLER_TASK_URL=http://stub-server:3456/renren-api/classify/open/crawler/tasks
      - CRAWLER_CALLBACK_URL=http://stub-server:3456/renren-api/classify/open/crawler/callback
      - CRAWLER_CHANNELS=1
      - CRAWLER_POLL_INTERVAL=2000
      - CRAWLER_POLL_LIMIT=10
      - CRAWLER_BASE_URL=http://stub-server:3456
      - CRAWLER_IMAGE_DIR=/app/output/test-deployment-images
      - CRAWLER_HEADLESS=true
    command: bash -c "npm ci && npm run service"
    depends_on:
      stub-server:
        condition: service_healthy

  crawler-node-2:
    image: mcr.microsoft.com/playwright:v1.60.0-jammy
    working_dir: /app
    volumes:
      - ../..:/app
    environment:
      - CRAWLER_MODE=service
      - CRAWLER_NODE_CODE=crawler-02
      - CRAWLER_NODE_TOKEN=test-token
      - CRAWLER_TASK_URL=http://stub-server:3456/renren-api/classify/open/crawler/tasks
      - CRAWLER_CALLBACK_URL=http://stub-server:3456/renren-api/classify/open/crawler/callback
      - CRAWLER_CHANNELS=1
      - CRAWLER_POLL_INTERVAL=2000
      - CRAWLER_POLL_LIMIT=10
      - CRAWLER_BASE_URL=http://stub-server:3456
      - CRAWLER_IMAGE_DIR=/app/output/test-deployment-images
      - CRAWLER_HEADLESS=true
    command: bash -c "npm ci && npm run service"
    depends_on:
      stub-server:
        condition: service_healthy

  crawler-node-3:
    image: mcr.microsoft.com/playwright:v1.60.0-jammy
    working_dir: /app
    volumes:
      - ../..:/app
    environment:
      - CRAWLER_MODE=service
      - CRAWLER_NODE_CODE=crawler-03
      - CRAWLER_NODE_TOKEN=test-token
